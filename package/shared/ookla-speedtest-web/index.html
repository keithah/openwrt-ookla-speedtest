<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Speedtest</title><link rel="stylesheet" href="styles.css"></head><body><main id="app"><header><div class="brand">SPEEDTEST</div><nav aria-label="Primary"><button data-view="history">History</button><button data-view="analytics">Analytics</button><button data-view="settings">Settings</button><button data-view="about">About</button></nav></header><section class="hero"><div class="route"><span>ROUTER</span><b>›</b><span>INTERNET</span></div><button id="go-control" aria-label="Start speed test" class="go">GO</button><p id="status">Ready to test your connection</p><div class="meta"><span id="isp-badge">ISP</span><span id="network-badge">Wi‑Fi</span></div><div class="server"><div><small>SERVER</small><strong id="server-name">Auto</strong><span id="server-detail">Select a server</span></div><button id="server-picker">Change</button></div></section><section id="view" aria-live="polite"></section><div id="metrics" aria-live="polite"></div><div id="server-panel" hidden><input id="server-search" type="search" placeholder="Search servers" aria-label="Search servers"><div id="server-results" role="listbox" aria-label="Server results"></div></div></main><script src="app.js"></script></body></html>
